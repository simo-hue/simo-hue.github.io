{{ define "main" }}
<section class="section" style="min-height: 70vh; display: flex; align-items: center; justify-content: center;">
  <div class="container">
    <div class="row justify-center text-center">
      <div class="lg:col-6">
        <!-- Animated offline icon -->
        <div style="font-size: 5rem; margin-bottom: 1.5rem; animation: float 3s ease-in-out infinite;">
          📡
        </div>
        <h1 class="h2 mb-4">You're Offline</h1>
        <p class="text-lg opacity-70 mb-8">
          It looks like you've lost your connection. Don't worry — some of my pages are cached and available to read
          offline!
        </p>
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
          <button onclick="window.history.back()" class="btn btn-primary">
            <i class="fas fa-arrow-left mr-2"></i>
            Go Back
          </button>
          <button onclick="window.location.reload()" class="btn btn-outline-primary">
            <i class="fas fa-sync-alt mr-2"></i>
            Try Again
          </button>
        </div>
        <p class="text-sm opacity-50 mt-8">
          <i class="fas fa-info-circle mr-1"></i>
          Previously visited pages are available offline.
        </p>
      </div>
    </div>
  </div>
</section>

<style>
  @keyframes float {

    0%,
    100% {
      transform: translateY(0);
    }

    50% {
      transform: translateY(-15px);
    }
  }
</style>
{{ end }}
