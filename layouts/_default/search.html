{{ define "main" }}
<section class="ds-hero" style="padding-bottom:0">
  <div class="ds-container">
    <span class="ds-eyebrow">Search</span>
    <h1 class="ds-hero-title" style="font-size:clamp(2.25rem,6vw,4rem);margin-top:1.25rem">{{ .Title }}</h1>
    {{ with .Params.description }}<p class="ds-hero-lead" style="margin-top:1.25rem">{{ . }}</p>{{ end }}
  </div>
</section>

<hr class="ds-rule" />

<section class="section" style="padding-top:3.5rem">
  <div class="ds-container">
    {{ partial "search-page.html" (dict "Context" . "Class" "max-w-4xl mx-auto") }}
  </div>
</section>
{{ end }}
