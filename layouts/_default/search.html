{{ define "main" }}
<section class="section">
  <div class="container">
    <div class="text-center mb-10">
      <h1 class="text-3xl md:text-5xl font-bold tracking-tight">{{ .Title }}</h1>
      {{ with .Params.description }}<p class="mt-3 opacity-80">{{ . }}</p>{{ end }}
    </div>
    {{ partial "search-page.html" (dict "Context" . "Class" "max-w-4xl mx-auto") }}
  </div>
</section>
{{ end }}
