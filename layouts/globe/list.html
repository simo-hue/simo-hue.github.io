{{ define "main" }}
<script src="//unpkg.com/globe.gl"></script>
<script src="//unpkg.com/d3"></script>

<div class="relative w-full h-screen bg-black overflow-hidden scale-110">
    <div id="globeViz"></div>
</div>

{{ $points := slice }}
{{ range where site.RegularPages "Params.lat" "!=" nil }}
{{ if .Params.lon }}
{{ $points = $points | append (dict "lat" .Params.lat "lng" .Params.lon "title" .Title) }}
{{ end }}
{{ end }}

<script>
    const pointsData = {{ $points | jsonify | safeJS }};
    const globeContainer = document.getElementById('globeViz');

    // Fetch Country Data (GeoJSON)
    fetch('//raw.githubusercontent.com/vasturiano/globe.gl/master/example/datasets/ne_110m_admin_0_countries.geojson')
        .then(res => res.json())
        .then(countries => {

            const world = Globe()
                (globeContainer)
                .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg') // Satellite View
                .bumpImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png')
                .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')

                // Polygon (Country) Layer
                .polygonsData(countries.features.filter(d => d.properties.ISO_A2 !== 'AQ'))
                .polygonCapColor(() => 'rgba(0, 0, 0, 0)') // Transparent by default to show satellite
                .polygonSideColor(() => 'rgba(0, 0, 0, 0)') // Transparent sides
                .polygonStrokeColor(() => 'rgba(255, 255, 255, 0.3)') // Subtle white borders
                .polygonLabel(({ properties: d }) => `
                    <div class="px-2 py-1 bg-black/80 text-white text-xs rounded">
                        ${d.ADMIN}
                    </div>
                `)
                .onPolygonHover(hoverD => {
                    world
                        .polygonCapColor(d => d === hoverD ? 'rgba(255, 255, 255, 0.1)' : 'rgba(0, 0, 0, 0)')
                        .polygonSideColor(d => d === hoverD ? 'rgba(255, 255, 255, 0.2)' : 'rgba(0, 0, 0, 0)')
                        .polygonStrokeColor(d => d === hoverD ? 'rgba(255, 255, 255, 0.8)' : 'rgba(255, 255, 255, 0.3)');
                })

                // Points (Visited Places)
                .pointsData(pointsData)
                .pointAltitude(0.01) // Close to surface
                .pointColor(() => '#ff0000') // Red dots
                .pointRadius(0.2) // Small dots
                .pointLabel('title') // Still show simple label on hover

                // Zoom Controls
                .pointOfView({ altitude: 2.5 }); // Initial view

            // Controls settings
            world.controls().autoRotate = true;
            world.controls().autoRotateSpeed = 0.5;
            world.controls().minDistance = 120;
            world.controls().maxDistance = 600;
            world.controls().zoomSpeed = 0.6;

            // Stop rotation on interaction
            globeContainer.addEventListener('mousedown', () => {
                world.controls().autoRotate = false;
            });

            // Responsive sizing
            window.addEventListener('resize', () => {
                world.width(window.innerWidth).height(window.innerHeight);
            });

            // Prevent Browser Zoom event listeners
            globeContainer.addEventListener('wheel', (e) => {
                if (e.ctrlKey) {
                    e.preventDefault();
                }
            }, { passive: false });

            globeContainer.addEventListener('gesturestart', (e) => e.preventDefault());
            globeContainer.addEventListener('gesturechange', (e) => e.preventDefault());
            globeContainer.addEventListener('gestureend', (e) => e.preventDefault());
        });

</script>
{{ end }}
