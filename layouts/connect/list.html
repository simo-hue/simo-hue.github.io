{{ define "main" }}
<section class="section pt-0 w-full max-w-md mx-auto px-4 text-center mt-12 flex flex-col justify-center min-h-[80vh]">
  <!-- Avatar -->
  <div class="mb-6 inline-block relative">
    <div class="absolute inset-0 bg-gradient-to-tr from-primary to-primary/50 rounded-full blur-xl opacity-50"></div>
    <img
      src="/images/profile_connect.png"
      alt="Simone Mattioli"
      class="w-32 h-32 rounded-full object-cover border-4 border-body relative z-10 shadow-2xl mx-auto"
      loading="lazy"
    />
  </div>

  <!-- Header Text -->
  <h1 class="text-3xl font-bold mb-2 text-dark dark:text-darkmode-dark">{{ .Title }}</h1>
  <p class="text-text dark:text-darkmode-text mb-8 text-lg font-light">{{ .Params.description }}</p>

  <!-- Save Contact Button (VCard) -->
  <a href="/simone-mattioli.vcf" class="btn btn-primary rounded-full py-4 px-8 w-full mb-8 flex items-center justify-center gap-3 text-lg shadow-lg hover:shadow-primary/30 hover:-translate-y-1 transition-all duration-300">
    <i class="fas fa-address-card text-xl"></i>
    Save Contact
  </a>

  <!-- Social Links Container -->
  <div class="flex flex-col gap-6">
    {{ range hugo.Data.connect.sections }}
      <!-- Section Divider -->
      <div class="flex items-center gap-4 mt-2 mb-2 opacity-80">
        <div class="h-px bg-border dark:bg-darkmode-border flex-1"></div>
        <span class="text-xs font-semibold uppercase tracking-widest text-text dark:text-darkmode-text">{{ .title }}</span>
        <div class="h-px bg-border dark:bg-darkmode-border flex-1"></div>
      </div>

      <!-- Links within Section -->
      <div class="flex flex-col gap-4">
        {{ range .links }}
          <a href="{{ .link }}" target="_blank" rel="noopener noreferrer" class="group flex items-center p-4 bg-theme-light dark:bg-darkmode-theme-light rounded-2xl hover:bg-white dark:hover:bg-darkmode-body border border-transparent hover:border-border dark:hover:border-darkmode-border shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 backdrop-blur-md">
            <div class="w-12 h-12 flex items-center justify-center rounded-full bg-body dark:bg-darkmode-body text-primary text-xl group-hover:scale-110 transition-transform duration-300 shadow-inner">
              <i class="{{ .icon }}"></i>
            </div>
            <span class="ml-4 font-semibold text-lg text-dark dark:text-darkmode-dark capitalize flex-1 text-left">{{ .name }}</span>
            <i class="fas fa-chevron-right text-text dark:text-darkmode-text opacity-50 group-hover:opacity-100 group-hover:translate-x-1 transition-all"></i>
          </a>
        {{ end }}
      </div>
    {{ end }}
  </div>
</section>
{{ end }}
